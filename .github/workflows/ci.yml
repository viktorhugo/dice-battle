name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install deps
        run: make install

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test (CI profile - 10k fuzz runs)
        run: FOUNDRY_PROFILE=ci forge test -vvv

      - name: Coverage summary
        run: forge coverage --ir-minimum --report summary
        continue-on-error: true

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint
        continue-on-error: true

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_GAME_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_NETWORK: "celo"
