[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["DiceBattle"]
fs_permissions = [{access = "read", path = "./out"}]

[profile.default.fuzz]
runs = 1_000
max_test_rejects = 500_000

[profile.default.invariant]
runs = 256
depth = 100
fail_on_revert = false

[profile.ci]
verbosity = 4

[profile.ci.fuzz]
runs = 10_000

[profile.ci.invariant]
runs = 1_000
depth = 500

[rpc_endpoints]
celo = "https://forno.celo.org"
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"

# Celoscan supports both mainnet and the Sepolia testnet under the same API key.
# Get yours at https://celoscan.io/myapikey
[etherscan]
celo = {key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42_220}
celo_sepolia = {key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api", chain = 11_142_220}

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
func_attrs_with_params_multiline = true
quote_style = "double"
number_underscore = "thousands"
