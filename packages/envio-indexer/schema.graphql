# ─── Raw event tables (one row per event) ───────────────────────────────────

type DiceBattle_RoomCancelled {
  id: ID!
  roomId: BigInt!
}

type DiceBattle_RoomCreated {
  id: ID!
  roomId: BigInt!
  playerA: String!
  token: String!
  stake: BigInt!
  commitment: String!
}

type DiceBattle_RoomExpiredClaim {
  id: ID!
  roomId: BigInt!
  claimer: String!
}

type DiceBattle_RoomJoined {
  id: ID!
  roomId: BigInt!
  playerB: String!
  matchedAtBlock: BigInt!
}

type DiceBattle_RoomResolved {
  id: ID!
  roomId: BigInt!
  winner: String!
  rollA1: BigInt!
  rollA2: BigInt!
  rollB1: BigInt!
  rollB2: BigInt!
  payout: BigInt!
  fee: BigInt!
}

type DiceBattle_RoomTied {
  id: ID!
  roomId: BigInt!
  rollA1: BigInt!
  rollA2: BigInt!
  rollB1: BigInt!
  rollB2: BigInt!
}

# ─── Aggregated entities ─────────────────────────────────────────────────────

type Room {
  id: ID!                 # roomId as string
  state: String!          # OPEN | MATCHED | RESOLVED | TIED | EXPIRED | CANCELLED
  playerA: String!
  playerB: String
  token: String!
  stake: BigInt!
  winner: String
  rollA1: Int
  rollA2: Int
  rollB1: Int
  rollB2: Int
  createdAt: BigInt!
  resolvedAt: BigInt
  txCreate: String!
  txResolve: String
}

type Player {
  id: ID!                 # lowercase address
  totalGames: BigInt!
  wins: BigInt!
  losses: BigInt!
  ties: BigInt!
  totalVolume: BigInt!
  totalWon: BigInt!
  totalLost: BigInt!
  lastGameAt: BigInt!
  currentStreak: BigInt!
  longestStreak: BigInt!
}
